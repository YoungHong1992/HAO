name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Bundle project
        run: |
          mkdir -p dist/hao
          cp -a hao install.sh lib maintenance nginx docker cliproxyapi new-api pi-coding-agent claude-code README.md AGENTS.md docs skills LICENSE dist/hao/
          tar czf hao.tar.gz -C dist hao
          sha256sum hao.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "HongAgentOps ${{ github.ref_name }}"
          body: |
            ## HAO（HongAgentOps）${{ github.ref_name }}

            ### 方式一：AI 协作部署（推荐）

            ```bash
            curl -fsSLO https://github.com/YoungHong1992/hao/releases/latest/download/hao.tar.gz
            tar xzf hao.tar.gz
            cd hao
            ./hao plan --services new-api --domain api.example.com
            ./hao preflight --services new-api --domain api.example.com
            sudo ./hao apply --services new-api --domain api.example.com --yes
            ```

            > 建议先由 AI agent 和用户确认服务、域名、数据库、风险项，再执行 apply。

            ### 方式二：Profile 部署

            ```bash
            curl -fsSLO https://github.com/YoungHong1992/hao/releases/latest/download/hao.tar.gz
            tar xzf hao.tar.gz
            cd hao
            cat > deploy.env <<'EOF'
            HAO_SERVICES="maintenance,nginx,docker,new-api"
            HAO_ACCESS_MODE="domain"
            HAO_NEWAPI_DOMAIN="api.example.com"
            HAO_DB_TYPE="postgresql"
            EOF
            ./hao plan --profile deploy.env
            ./hao preflight --profile deploy.env
            sudo ./hao apply --profile deploy.env --yes
            ```

            ### 方式三：远程入口

            ```bash
            curl -fsSL https://raw.githubusercontent.com/YoungHong1992/hao/${{ github.ref_name }}/install.sh | env HAO_REF=${{ github.ref_name }} bash
            ```

            > 无参数运行只显示帮助，不进入终端菜单。请使用 release 包或完整仓库中的 `hao plan/preflight/apply/status/doctor`。

            ### 可选组件

            | 组件 | 描述 | 资源需求 |
            |------|------|----------|
            | Maintenance | fail2ban / swap / journald 限制 / Docker 日志轮转 | 基础维护 |
            | Nginx (HTTP/3) | 高性能 Web 服务器 + 反向代理 | 512MB 内存 |
            | Docker | Docker Engine + Compose 插件 | 无额外需求 |
            | CliproxyAPI | 轻量 AI API 转发代理，默认 Docker Compose，可选裸机 | 256MB 内存 |
            | New-API | AI 模型网关与资产管理系统 | ≥ 1GB 内存 |
            | Pi | 终端 AI 编程助手 | 500MB 磁盘 |

          files: |
            hao.tar.gz
            checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

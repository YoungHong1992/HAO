name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit, branch, or tag to release
        required: true
        default: main
        type: string
      acceptance_evidence:
        description: URL or identifier for the completed real-VM acceptance record
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build date-hash release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run release gate
        run: ./tests/run.sh

      - name: Verify release commit belongs to main
        run: |
          set -euo pipefail
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main

      - name: Verify reviewed image candidates
        run: |
          set -euo pipefail
          today="$(date -u +%Y-%m-%d)"
          while IFS=$'\t' read -r service default_image candidate_one candidate_two maturity checked_at; do
            [[ "$service" == \#* || -z "$service" ]] && continue
            if [ "$checked_at" != "$today" ]; then
              echo "Image candidates for $service were reviewed on $checked_at, expected $today" >&2
              exit 1
            fi
            for image in "$default_image" "$candidate_one" "$candidate_two"; do
              docker manifest inspect "$image" >/dev/null
            done
            echo "$service: $maturity candidates verified"
          done < config/image-candidates.tsv

      - name: Generate immutable release identity
        env:
          GH_TOKEN: ${{ github.token }}
          ACCEPTANCE_EVIDENCE: ${{ inputs.acceptance_evidence }}
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=7 HEAD)"
          release_id="$(date -u +%y%m%d)-${short_sha}"
          if ! [[ "$release_id" =~ ^[0-9]{6}-[0-9a-f]{7}$ ]]; then
            echo "Invalid release id: $release_id" >&2
            exit 1
          fi
          if gh release view "$release_id" >/dev/null 2>&1 || git rev-parse "refs/tags/$release_id" >/dev/null 2>&1; then
            echo "Release already exists and will not be overwritten: $release_id" >&2
            exit 1
          fi
          printf '%s\n' "$release_id" > RELEASE
          jq -n \
            --arg release "$release_id" \
            --arg commit "$(git rev-parse HEAD)" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg acceptance_evidence "$ACCEPTANCE_EVIDENCE" \
            '{release: $release, commit: $commit, built_at: $built_at, acceptance_evidence: $acceptance_evidence}' > build-info.json
          echo "RELEASE_ID=$release_id" >> "$GITHUB_ENV"

      - name: Bundle project
        run: |
          set -euo pipefail
          mkdir -p dist/hao
          cp -a hao install.sh lib maintenance nginx docker cliproxyapi new-api pi-coding-agent claude-code README.md AGENTS.md docs skills config LICENSE RELEASE build-info.json dist/hao/
          tar czf hao.tar.gz -C dist hao
          sha256sum hao.tar.gz > checksums.txt

      - name: Verify bundled identity
        run: |
          set -euo pipefail
          test "$(tar -xOf hao.tar.gz hao/RELEASE)" = "$RELEASE_ID"
          test "$(tar -xOf hao.tar.gz hao/build-info.json | jq -r .commit)" = "$(git rev-parse HEAD)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_ID" hao.tar.gz checksums.txt \
            --target "$(git rev-parse HEAD)" \
            --title "HongAgentOps $RELEASE_ID" \
            --generate-notes \
            --latest
